<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sanginiela</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-dark">
<header class="header">
    <button class="menu-btn" aria-label="Menú">
        <svg viewBox="0 0 20 24" class="burger-tricolor">
            <rect class="line line-green" y="4" width="20" height="2.5" rx="1"/>
            <rect class="line line-white" y="10" width="20" height="2.5" rx="1"/>
            <rect class="line line-red" y="16" width="20" height="2.5" rx="1"/>
        </svg>
    </button>
    <h1 class="title"><span>⚽</span> sanginiela</h1>
</header>
<div class="match-card p-2 rounded">
    <div class="team">
        <span>Bosnia y Herzegovina</span>
        <img src="https://flagcdn.com/w80/ba.png">
    </div>

    <div class="score">
        <input type="number">
        <span>-</span>
        <input type="number">
    </div>

    <div class="team">
        <img src="https://flagcdn.com/w80/mx.png">
        <span>México</span>
    </div>
</div>
</body>
</html>
