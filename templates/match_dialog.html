{% load static %}
{# Dialog de detalle de partido + predicciones de todos. #}
{# Datos embebidos por la vista (build_match_dialog_payload); #}
{# match_dialog.js lo llena al clic en cualquier [data-dialog-match]. #}
{{ match_dialog_data|json_script:"match-dialog-data" }}
<dialog id="match-dialog" class="send-dialog match-dialog">
    <div class="send-dialog-head" id="match-dialog-title"></div>
    <div class="send-dialog-body" id="match-dialog-body"></div>
    <footer class="border-t border-gold/40 bg-[#0f1115]/90 px-2 py-2.5">
        <div class="mx-auto flex max-w-[900px] gap-2">
            <button class="submit-btn" data-dialog-close>Cerrar</button>
        </div>
    </footer>
</dialog>
<script src="{% static 'match_dialog.js' %}"></script>
