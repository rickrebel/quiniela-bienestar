{% extends "base.html" %}

{% block content %}
{% if invalid %}
<div class="form-body">
    <h1 class="login-title"><span>⚽</span>sanginiela</h1>
    <div class="inputs-layout">
        <p>El enlace es inválido o ya expiró.</p>
    </div>
    <p class="login-submit">
        <a href="{% url 'forgot_password' %}">Pedir un enlace nuevo</a>
    </p>
</div>
{% else %}
<form class="form-body" action="" method="post" novalidate>
    {% csrf_token %}
    <h1 class="login-title"><span>⚽</span>sanginiela</h1>
    <div class="inputs-layout">
        <p>Nueva contraseña para <strong>{{ email }}</strong></p>
        <p>
            <c-password-field :field="form.password" />
            <br/>
            <c-password-field :field="form.password_confirm" />
        </p>
    </div>
    <p class="login-submit">
        <input type="submit" value="Guardar contraseña">
    </p>
</form>
{% endif %}
{% endblock %}
