{% extends "base.html" %}

{% block content %}
<form class="form-body" action="" method="post" novalidate>
    {% csrf_token %}
    <h1 class="login-title"><span>⚽</span>quiniela</h1>
    <div class="inputs-layout">
        <p>
            Escribe tu correo y te mandamos un enlace para crear una
            contraseña nueva.
        </p>
        {% if sent_message %}
        <p class="text-success">{{ sent_message }}</p>
        {% endif %}
        <p>
            {{ form.email.label_tag }}
            {{ form.email }}
            <br>
            <c-field-errors :field="form.email" />
        </p>
    </div>
    <p class="login-submit">
        <input type="submit" value="Enviar enlace">
    </p>
    <p style="text-align: center;">
        <a href="{% url 'login' %}">Volver al acceso</a>
    </p>
</form>
{% endblock %}
