{# Campo de contraseña: label + input + botón mostrar/ocultar + errores. #}
{# El botón (.password-toggle) y el icono los maneja auth.js, que cambia #}
{# el ligature del Material Symbol entre visibility / visibility_off. #}
{# Uso: <c-password-field :field="form.password" /> #}
<c-vars field="" />
{{ field.label_tag }}
<span class="password-field">
    {{ field }}
    <button type="button" class="password-toggle"
            aria-pressed="false"
            aria-label="Mostrar contraseña">
        <c-icon name="visibility" class="text-[22px]" />
    </button>
</span>
<br>
<c-field-errors :field="field" />
