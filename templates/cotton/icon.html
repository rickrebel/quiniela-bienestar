{# Ícono de Material Symbols Outlined (Google Fonts, subset en #}
{# base.html). El nombre debe estar en icon_names del <link> o se #}
{# renderiza como texto. Tamaño/color por class (font-size manda). #}
{# Uso: <c-icon name="chevron_right" class="text-base text-primary" /> #}
<span class="material-symbols-outlined select-none leading-none {{ class }}"
      aria-hidden="true">{{ name }}</span>
